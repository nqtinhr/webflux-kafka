# Prometheus global config
global:
  # Tầm suất thu thập metrics
  scrape_interval: 20s # default = 1m
  # Tầm suất đánh giá alert rules
  evaluation_interval: 15s # default = 1m
  # Thời gian timeout với metrics chờ lâu
  scrape_timeout: 18s # default = 10s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alert-manager:9093"]

# Load rules và định kỳ đánh giá dựa trên 'evaluation_interval'.
rule_files:
  - "rules/*.yml"
# - "cisco-rules.yml"
# - "windows-rules.yml"
# - "global-rules.yml"
# - "firewall-rules.yml"
# - "vmware-rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          hostname: Prometheus
          type: monitoring

  - job_name: "alertmanager"
    static_configs:
      - targets: ["alert-manager:9093"]
        labels:
          hostname: Alertmanager
          type: monitoring

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          hostname: Node-exporter
          type: system

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          hostname: cAdvisor
          type: container
