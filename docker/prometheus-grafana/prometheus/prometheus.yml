# Prometheus global config
global:
  # Tầm suất thu thập metrics
  scrape_interval: 20s # default = 1m
  # Tầm suất đánh giá alert rules
  evaluation_interval: 15s # default = 1m
  # Thời gian timeout với metrics chờ lâu
  scrape_timeout: 18s # default = 10s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
      - targets: ["alert-manager:9093"]

# Load rules và định kỳ đánh giá dựa trên 'evaluation_interval'.
rule_files:
  - "rules/*.yml"
# - "cisco-rules.yml"
# - "windows-rules.yml"
# - "global-rules.yml"
# - "firewall-rules.yml"
# - "vmware-rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
scrape_configs:
  ##### Prometheus server #####
  - job_name: "monitor-cluster"
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          hostname: PrometheusProd
          type: docker
      - targets: ["alert-manager:9093"]
        labels:
          hostname: Alert-manager
          type: docker

  - job_name: 'micro-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 3s
    static_configs:
      - targets: [ '192.168.10.118:9211', '192.168.10.118:9214', '192.168.10.118:9212' ]

  - job_name: 'account-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 3s
    static_configs:
      - targets: [ '192.168.10.118:9211' ]

  - job_name: 'profile-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 3s
    static_configs:
      - targets: [ '192.168.10.118:9214' ]

  - job_name: 'payment-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 3s
    static_configs:
      - targets: [ '192.168.10.118:9212' ]
