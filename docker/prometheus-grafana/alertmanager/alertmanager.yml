global:
  # Đặt thời gian timeout các alert không có EndsAt (bình thường luôn có) sau thời gian này sẽ đặt thành resolved.
  resolve_timeout: 1m # default = 5m

route:
  # Nhóm các cảnh báo theo tên cảnh báo (alertname).
  group_by: ["alertname"]

  # Đặt thời gian chờ trước khi gửi cảnh báo sau khi nhận được cảnh báo đầu tiên trong nhóm.
  group_wait: 30s # default = 30s

  # Đặt khoảng thời gian giữa việc gửi các cảnh báo mới trong cùng một nhóm mà đã được gửi trước đó.
  group_interval: 5m # default = 5m

  # Đặt khoảng thời gian lặp lại việc gửi cảnh báo sau khi cảnh báo đã được gửi thành công rồi.
  repeat_interval: 1d # default = 4h

  # Người nhận mặc định cho các cảnh báo nếu không được xác định trong cấu hình cụ thể.
  receiver: "telegram-test"

  # Định tuyến các cảnh báo theo điều kiện cụ thể
  routes:
    - match:
        severity: warning
      receiver: "telegram-warning"
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1d
      active_time_intervals:
        - workhours
    - match:
        severity: error
      receiver: "telegram-alert"
      group_wait: 20s
      group_interval: 2m
      repeat_interval: 1h
      active_time_intervals:
        - workhours
    - match:
        severity: critical
      receiver: "telegram-alert"
      group_wait: 15s
      group_interval: 1m
      repeat_interval: 1h

# Chỉ định templates
templates:
  - "/etc/alertmanager/template.tmpl"

# Đặt thời gian làm việc
time_intervals:
  - name: workhours
    time_intervals:
      - weekdays: ["monday:friday"]
        location: 'Asia/Ho_Chi_Minh'
        times:
          - start_time: "08:00"
            end_time: "18:00"
      - weekdays: ["saturday"]
        location: 'Asia/Ho_Chi_Minh'
        times:
          - start_time: "08:00"
            end_time: "12:00"

receivers:
  - name: "email"
    email_configs:
      - to: "example@gmail.com"
        from: "example@gmail.com"
        smarthost: "smtp.gmail.com:587"
        auth_identity: "example@gmail.com"
        auth_secret: "<your_secret>"
        auth_username: "example@gmail.com"
        send_resolved: false # gửi cảnh báo khi chúng được giải quyết
  - name: "telegram-test"
    telegram_configs:
      - api_url: "https://api.telegram.org"
        chat_id: <your_chat_id>
        bot_token: "<your_bot_token>"
        send_resolved: true # gửi cảnh báo khi chúng được giải quyết
        message: '{{ template "telegram.default.message" . }}'
  - name: "telegram-warning"
    telegram_configs:
      - api_url: "https://api.telegram.org"
        chat_id: <your_chat_id>
        bot_token: "<your_bot_token>"
        send_resolved: true # gửi cảnh báo khi chúng được giải quyết
        message: '{{ template "telegram.default.message" . }}'
  - name: "telegram-alert"
    telegram_configs:
      - api_url: "https://api.telegram.org"
        chat_id: <your_chat_id>
        bot_token: "<your_bot_token>"
        send_resolved: true # gửi cảnh báo khi chúng được giải quyết
        message: '{{ template "telegram.default.message" . }}'
  - name: "webhook"
    webhook_configs:
      - url: "http://api.my-alert.com/alert/7204342151"
        send_resolved: true # gửi cảnh báo khi chúng được giải quyết

# inhibit_rule kiểm tra hai loại cảnh báo: cảnh báo mục tiêu (target) và cảnh báo nguồn (source).
# Cả hai cảnh báo này phải có các nhãn (labels) giống nhau dựa trên danh sách các nhãn được xác định.
# warning < error < critical
inhibit_rules:
  # Tạm thời đình chỉ cảnh báo "warning" trong 10 phút sau khi xảy ra cảnh báo "critical" cùng alertname.
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
  # Tạm thời đình chỉ cảnh báo "warning" trong 10 phút sau khi xảy ra cảnh báo "critical" cùng zone.
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["zone"]
  # Tạm thời đình chỉ cảnh báo "error" trong 10 phút sau khi xảy ra cảnh báo "critical" cùng zone.
  - source_match:
      severity: "critical"
    target_match:
      severity: "error"
    equal: ["zone"]
