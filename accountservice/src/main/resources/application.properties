spring.application.name=account-service
spring.r2dbc.url=r2dbc:pool:mysql://localhost:3306/accountdb
spring.r2dbc.username=root
spring.r2dbc.password=root
server.port=9211

kafka.bootstrap.servers=localhost:9092,localhost:9093,localhost:9094
spring.kafka.producer.retries=3
spring.kafka.producer.batch-size=16384
spring.kafka.producer.buffer-memory=33554432
payment.kafka.consumer-group-id=accountService-groupId
#logging.level.org.springframework = DEBUG

spring.liquibase.url=jdbc:mysql://localhost:3306/accountdb
spring.liquibase.enabled=true
spring.liquibase.user=root
spring.liquibase.password=root
spring.liquibase.change-log=classpath:db/changelog/changelog-master.xml

#Expose all the Actuator endpoints
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true